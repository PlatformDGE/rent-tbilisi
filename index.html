<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent in Tbilisi — Live Listings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E3A6E;--navy-d:#152d55;
  --red:#E8192C;--red-d:#c0111f;
  --white:#fff;
  --g50:#f8f9fb;--g100:#f1f3f7;--g200:#e4e8ef;--g300:#cdd2db;
  --g400:#9aa3b0;--g500:#667085;--g700:#374151;--g900:#111827;
  --sh1:0 1px 3px rgba(0,0,0,.07);--sh2:0 4px 20px rgba(0,0,0,.09);--sh3:0 12px 40px rgba(0,0,0,.13);
}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--g900);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* NAV */
nav{height:68px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:200;position:relative}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.brand-logo{width:38px;height:38px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:11px;font-weight:700;flex-direction:column;line-height:1.2;text-align:center}
.brand-logo .fl{font-size:9px}
.brand-text strong{display:block;font-size:15px;font-weight:700;color:var(--navy);letter-spacing:-.2px}
.brand-text span{font-size:11px;color:var(--g400)}
.search-bar{flex:1;max-width:640px;display:flex;align-items:center;height:46px;border:1.5px solid var(--g200);border-radius:40px;background:var(--white);box-shadow:var(--sh1);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.search-bar:focus-within{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,110,.1)}
.s-seg{flex:1;padding:0 16px;border-right:1px solid var(--g200);height:100%;display:flex;flex-direction:column;justify-content:center;cursor:pointer}
.s-seg:last-of-type{border-right:none}
.s-seg label{font-size:10px;font-weight:700;color:var(--g900);letter-spacing:.3px;text-transform:uppercase;pointer-events:none}
.s-seg input,.s-seg select{border:none;outline:none;font-size:13px;color:var(--g500);background:transparent;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;width:100%;padding:0}
.s-seg input::placeholder{color:var(--g300)}
.s-btn{width:40px;height:40px;border-radius:50%;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:0 4px;color:var(--white);font-size:15px;transition:background .15s}
.s-btn:hover{background:var(--red-d)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.view-tabs{display:flex;background:var(--g100);border-radius:8px;padding:3px;gap:2px}
.vt{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--g500);transition:all .15s;font-family:'Inter',sans-serif}
.vt.on{background:var(--white);color:var(--navy);box-shadow:var(--sh1)}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--red);padding:5px 10px;border:1px solid rgba(232,25,44,.2);border-radius:20px;background:rgba(232,25,44,.04)}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* FILTERS */
.filters{height:52px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 20px;gap:8px;flex-shrink:0;overflow-x:auto}
.filters::-webkit-scrollbar{display:none}
.fp{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1.5px solid var(--g200);border-radius:20px;font-size:12px;font-weight:600;color:var(--g700);background:var(--white);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif;appearance:none}
.fp:hover{border-color:var(--navy);color:var(--navy)}
.fp.on{background:var(--navy);border-color:var(--navy);color:var(--white)}
.fp select{border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:inherit;cursor:pointer;appearance:none}
.fdiv{width:1px;height:22px;background:var(--g200);flex-shrink:0}
.fcount{margin-left:auto;font-size:12px;color:var(--g500);flex-shrink:0;white-space:nowrap}
.fcount strong{color:var(--g900)}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}
.list-panel{width:52%;overflow-y:auto;background:var(--g50)}
.list-panel::-webkit-scrollbar{width:5px}
.list-panel::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--g200)}

/* CARD */
.card{background:var(--white);cursor:pointer;transition:background .15s;position:relative}
.card:hover{background:var(--g50)}
.card.hl{background:var(--g50);box-shadow:inset 3px 0 0 var(--navy)}
.card-photo{width:100%;padding-top:62%;position:relative;overflow:hidden;background:var(--g100)}
.card-photo-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:transform .3s;overflow:hidden}
.card-photo-inner img{width:100%;height:100%;object-fit:cover}
.card-photo-inner .emoji-placeholder{font-size:44px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e4edf8,#c8d8ec)}
.card:hover .card-photo-inner{transform:scale(1.03)}
.card-badges{position:absolute;top:8px;left:8px;display:flex;gap:5px;z-index:2}
.badge{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.3px}
.b-new{background:var(--red);color:var(--white)}
.b-excl{background:var(--navy);color:var(--white)}
.b-sale{background:var(--g900);color:var(--white)}
.b-comm{background:#6d28d9;color:var(--white)}
.card-fav{position:absolute;top:8px;right:8px;width:28px;height:28px;background:rgba(255,255,255,.88);border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2;transition:transform .15s;backdrop-filter:blur(4px)}
.card-fav:hover{transform:scale(1.2)}
.card-body{padding:11px 12px 12px}
.card-loc{font-size:13px;font-weight:600;color:var(--g900);margin-bottom:2px}
.card-sub{font-size:11px;color:var(--g500);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-specs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.spec{font-size:10px;color:var(--g500);background:var(--g100);padding:2px 6px;border-radius:5px}
.card-price{font-size:15px;font-weight:700;color:var(--g900)}
.card-price span{font-size:11px;font-weight:400;color:var(--g400)}
.no-comm{font-size:10px;color:#16a34a;font-weight:600;margin-top:3px}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--g100)}
.agent-row{display:flex;align-items:center;gap:6px}
.av{width:20px;height:20px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--white)}
.agent-name{font-size:11px;color:var(--g500)}
.card-btns{display:flex;gap:5px}
.cb{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;display:flex;align-items:center;gap:3px;transition:opacity .15s}
.cb:hover{opacity:.82}
.cb-tg{background:#0088cc;color:var(--white)}
.cb-call{background:var(--red);color:var(--white)}

/* MAP */
.map-panel{flex:1;position:relative;border-left:1px solid var(--g200)}
#map{width:100%;height:100%}
.pm{background:var(--white);border:2px solid var(--navy);border-radius:18px;padding:4px 10px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--navy);white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.14);cursor:pointer;transition:all .15s;display:inline-block;line-height:1.4}
.pm:hover,.pm.on{background:var(--navy);color:var(--white)}
.pm.new-pin{background:var(--navy);border-color:var(--navy);color:var(--white);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.leaflet-popup-content-wrapper{border-radius:14px!important;padding:0!important;overflow:hidden;box-shadow:var(--sh3)!important;border:1px solid var(--g200)!important}
.leaflet-popup-content{margin:0!important;width:240px!important}
.leaflet-popup-tip-container{display:none}
.pu-photo{height:110px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--g100)}
.pu-photo img{width:100%;height:100%;object-fit:cover}
.pu-photo .ep{font-size:38px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e4edf8,#c8d8ec)}
.pu-body{padding:10px 12px 12px}
.pu-loc{font-size:12px;font-weight:700;color:var(--g900);margin-bottom:2px}
.pu-sub{font-size:10px;color:var(--g500);margin-bottom:6px}
.pu-price{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:8px}
.pu-btns{display:flex;gap:6px}
.pu-btn{flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;text-align:center;display:block;transition:opacity .15s}
.pu-btn:hover{opacity:.85}
.pb-navy{background:var(--navy);color:var(--white)}
.pb-tg{background:#0088cc;color:var(--white)}
.map-stats{position:absolute;bottom:20px;left:12px;background:var(--white);border-radius:12px;padding:12px 16px;box-shadow:var(--sh2);border:1px solid var(--g200);z-index:500;min-width:152px}
.ms-row{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:3px 0}
.ms-lbl{font-size:11px;color:var(--g500)}
.ms-val{font-size:13px;font-weight:700;color:var(--navy)}
.ms-val.red{color:var(--red)}

/* MODAL */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.modal-wrap.open{display:flex}
.modal{background:var(--white);border-radius:20px;width:92%;max-width:700px;max-height:92vh;overflow-y:auto;position:relative;animation:mUp .28s cubic-bezier(.34,1.1,.64,1)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}
@keyframes mUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.modal-photo{height:260px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--g100);border-radius:20px 20px 0 0;position:relative}
.modal-photo img{width:100%;height:100%;object-fit:cover}
.modal-photo .ep{font-size:80px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e4edf8,#c0d4ec)}
.modal-x{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(255,255,255,.9);border:none;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g700);box-shadow:var(--sh1);z-index:5}
.modal-body{padding:22px 24px 28px}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
.modal-title{font-size:20px;font-weight:700;color:var(--g900);line-height:1.2;margin-bottom:4px}
.modal-addr{font-size:13px;color:var(--g500);margin-top:3px}
.modal-price-main{font-size:24px;font-weight:700;color:var(--navy)}
.modal-price-sub{font-size:11px;color:var(--g400);margin-top:2px;text-align:right}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.mt{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.mt-rent{background:rgba(30,58,110,.08);color:var(--navy)}
.mt-sale{background:rgba(17,24,39,.08);color:var(--g700)}
.mt-excl{background:rgba(232,25,44,.08);color:var(--red)}
.mt-comm{background:rgba(109,40,217,.08);color:#6d28d9}
.mt-ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);margin-bottom:10px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.di{background:var(--g50);border-radius:10px;padding:10px 12px}
.di-lbl{font-size:10px;color:var(--g400);margin-bottom:3px}
.di-val{font-size:13px;font-weight:600;color:var(--g900)}
.am-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px}
.am{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--g50);border-radius:9px;font-size:11px;font-weight:500;color:var(--g700)}
.am.no{opacity:.35;text-decoration:line-through}
.modal-agent{display:flex;align-items:center;gap:12px;padding:14px;background:var(--g50);border-radius:12px;margin-bottom:18px}
.modal-av{width:42px;height:42px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--white);flex-shrink:0}
.modal-an{font-size:14px;font-weight:600;color:var(--g900)}
.modal-ar{font-size:11px;color:var(--g500);margin-top:2px}
.modal-cta{display:flex;gap:8px}
.mc{flex:1;padding:13px;border-radius:12px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;text-align:center;display:block;transition:opacity .15s}
.mc:hover{opacity:.87}
.mc-navy{background:var(--navy);color:var(--white)}
.mc-red{background:var(--red);color:var(--white)}
.mc-tg{background:#0088cc;color:var(--white)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--navy);color:var(--white);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:var(--sh3);z-index:3000;display:flex;align-items:center;gap:9px;cursor:pointer;transition:transform .38s cubic-bezier(.34,1.4,.64,1);white-space:nowrap;border-left:4px solid var(--red)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* LOADING */
.loading{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
.loading.gone{opacity:0;pointer-events:none}
.ld-circle{width:68px;height:68px;border-radius:50%;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px}
.ld-name{font-size:24px;font-weight:700;color:var(--white);letter-spacing:-.3px}
.ld-name em{color:var(--red);font-style:normal}
.ld-sub{font-size:12px;color:rgba(255,255,255,.4)}
.ld-bar{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--red);border-radius:2px;animation:lfill 1.9s ease forwards}
@keyframes lfill{from{width:0}to{width:100%}}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--g400)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:600;color:var(--g700);margin-bottom:5px}
.error-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;margin:12px;font-size:13px;color:#dc2626;display:none}
.error-banner.show{display:block}
@media(max-width:860px){.map-panel{display:none}.list-panel{width:100%}.grid{grid-template-columns:1fr}}

/* ── GALLERY ── */
.gallery{position:relative;width:100%;height:260px;overflow:hidden;border-radius:20px 20px 0 0;background:var(--g100)}
.gallery-track{display:flex;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.gallery-slide{flex-shrink:0;width:100%;height:100%;object-fit:cover}
.gallery-slide.ep{display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#e4edf8,#c0d4ec)}
.gallery-prev,.gallery-next{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;background:rgba(255,255,255,.9);border:none;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh1);z-index:5;transition:background .15s}
.gallery-prev{left:12px}.gallery-next{right:12px}
.gallery-prev:hover,.gallery-next:hover{background:var(--white)}
.gallery-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5}
.gallery-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);border:none;cursor:pointer;padding:0;transition:background .15s}
.gallery-dot.on{background:var(--white)}
.gallery-count{position:absolute;top:12px;right:50px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;z-index:5}
@media(max-width:860px){
  body{overflow:auto}
  nav{height:56px;padding:0 12px;gap:8px;flex-wrap:nowrap}
  .brand-text{display:none}
  .brand-logo{width:34px;height:34px;font-size:10px}
  .search-bar{height:38px;border-radius:30px}
  .s-seg{padding:0 10px}
  .s-seg label{font-size:9px}
  .s-seg input,.s-seg select{font-size:12px}
  .s-seg:nth-child(2),.s-seg:nth-child(3){display:none}
  .s-btn{width:34px;height:34px;font-size:13px;margin:0 3px}
  .nav-right{gap:6px}
  .view-tabs{display:none}
  .live-pill{font-size:10px;padding:4px 8px}
  .filters{height:44px;padding:0 12px;gap:6px}
  .fp{padding:5px 10px;font-size:11px}
  .fcount{display:none}
  .body{flex-direction:column;height:auto;overflow:visible}
  .list-panel{width:100%;overflow:visible;padding:0}
  .grid{grid-template-columns:1fr;gap:0}
  .card-photo{padding-top:55%}
  .map-panel{display:none}
  
  /* Mobile map button */
  .mobile-map-btn{
    display:flex;
    position:fixed;bottom:20px;left:50%;
    transform:translateX(-50%);
    background:var(--navy);color:var(--white);
    border:none;border-radius:24px;
    padding:12px 24px;
    font-size:14px;font-weight:700;
    font-family:'Inter',sans-serif;
    box-shadow:0 4px 20px rgba(30,58,110,.4);
    cursor:pointer;z-index:900;
    align-items:center;gap:8px;
    white-space:nowrap;
  }

  /* Mobile map overlay */
  .mobile-map-overlay{
    display:none;
    position:fixed;inset:0;
    z-index:800;
    flex-direction:column;
    background:var(--white);
  }
  .mobile-map-overlay.open{display:flex}
  .mobile-map-header{
    height:52px;background:var(--white);
    border-bottom:1px solid var(--g200);
    display:flex;align-items:center;
    padding:0 16px;gap:12px;flex-shrink:0;
  }
  .mobile-map-back{
    background:none;border:none;
    font-size:20px;cursor:pointer;color:var(--navy);
    padding:4px;
  }
  .mobile-map-title{font-size:15px;font-weight:700;color:var(--navy)}
  .mobile-map-body{flex:1;position:relative}
  .mobile-map-body #map-mobile{width:100%;height:100%}

  /* Modal mobile */
  .modal{width:100%;max-width:100%;border-radius:20px 20px 0 0;
    position:fixed;bottom:0;max-height:92vh}
  .modal-bg{align-items:flex-end}
  .gallery{height:200px}
  .detail-grid{grid-template-columns:1fr 1fr}
  .am-grid{grid-template-columns:1fr 1fr}
  .modal-cta{flex-wrap:wrap}
  .mc{min-width:calc(50% - 4px);padding:11px}
}
@media(min-width:861px){
  .mobile-map-btn{display:none}
  .mobile-map-overlay{display:none!important}
}
</style>
</head>
<body>



<nav>
  <a class="brand" href="#">
    <div class="brand-logo"><div>RIT</div><div class="fl">🇬🇪</div></div>
    <div class="brand-text"><strong>Rent in Tbilisi</strong><span>@rent_tbilisi_ge · live</span></div>
  </a>
  <div class="search-bar">
    <div class="s-seg" style="flex:1.4">
      <label>Район / адрес</label>
      <input type="text" id="sAddr" placeholder="Vake, Saburtalo, Isani..." oninput="run()">
    </div>
    <div class="s-seg">
      <label>Тип</label>
      <select id="sType" onchange="run()">

// JSONP loader — обходит CORS без сервера
function loadJSONP(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cb];
      try { document.head.removeChild(script); } catch(e){}
      reject(new Error('JSONP timeout'));
    }, 8000);
    window[cb] = (data) => {
      clearTimeout(timer);
      delete window[cb];
      try { document.head.removeChild(script); } catch(e){}
      resolve(data);
    };
    script.onerror = () => {
      clearTimeout(timer);
      reject(new Error('JSONP failed'));
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(script);
  });
}

async function loadSheets() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('ВСТАВЬ')) {
    ALL = getDemoData();
    document.getElementById('stUpd').textContent = 'Demo';
    return true;
  }
  try {
    // Use script injection to bypass CORS
    const data = await new Promise((resolve, reject) => {
      const id = 'gs_' + Date.now();
      window[id] = resolve;
      const s = document.createElement('script');
      s.src = APPS_SCRIPT_URL + '?cb=' + id;
      s.onerror = reject;
      setTimeout(() => reject(new Error('timeout')), 10000);
      document.head.appendChild(s);
    });
    const rows = data.listings || [];
    const bool = v => v === 'TRUE' || v === true;

    ALL = rows.map((obj, i) => {
      // Parse photos array
      if (obj.photos && String(obj.photos).startsWith('[')) {
        try { obj._photos = JSON.parse(obj.photos); } catch(e){ obj._photos = []; }
      } else { obj._photos = []; }
      if (obj.photo && String(obj.photo).startsWith('http') && obj._photos.indexOf(obj.photo) === -1) {
        obj._photos.unshift(obj.photo);
      }
      obj.photos = JSON.stringify(obj._photos);
      obj._am = {
        wifi: bool(obj.wifi), stove: bool(obj.stove),
        balcony: bool(obj.balcony), tv: bool(obj.tv),
        conditioner: bool(obj.conditioner), dishwasher: bool(obj.dishwasher),
        elevator: bool(obj.elevator), washing_machine: bool(obj.washing_machine),
        microwave: bool(obj.microwave), parking: bool(obj.parking),
      };
      obj.is_exclusive = bool(obj.is_exclusive);
      obj.is_new       = bool(obj.is_new);
      if (obj.lat && obj.lng && parseFloat(obj.lat) > 0) {
        obj._lat = parseFloat(obj.lat);
        obj._lng = parseFloat(obj.lng);
      } else {
        const c = rndCoord(obj.district || '');
        obj._lat = c[0]; obj._lng = c[1];
      }
      obj._posted = obj.parsed_at ? new Date(obj.parsed_at) : new Date(Date.now() - i*3600000);
      obj._isNew  = i < 5;
      obj._emoji  = EM[i % EM.length];
      return obj;
    }).filter(l => l.price && parseFloat(l.price) > 0);

    document.getElementById('stUpd').textContent = new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    return true;
  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('errBanner').classList.add('show');
    ALL = getDemoData();
    return false;
  }
}

function setRoom(el,v){

function run(){
  const addr=document.getElementById('sAddr').value.toLowerCase();
  const type=document.getElementById('sType').value;
  const price=document.getElementById('sPrice').value;
  const dist=document.getElementById('fDist').value;
  const build=document.getElementById('fBuild').value;
  const am=document.getElementById('fAm').value;
  const sort=document.getElementById('fSort').value;
  shown=ALL.filter(l=>{
    const r=parseInt(l.rooms)||0;
    if(addr&&![l.title,l.address,l.district].some(s=>String(s).toLowerCase().includes(addr)))return false;
    if(type&&l.type!==type)return false;
    if(dist&&l.district!==dist)return false;
    if(build&&l.building!==build)return false;
    if(roomF!==''){if(roomF==='4'&&r<4)return false;if(roomF!=='4'&&r!=parseInt(roomF))return false;}
    if(price){const[mn,mx]=price.split('-').map(Number);const p=parseFloat(l.price)||0;if(p<mn||p>mx)return false;}
    if(am){if(am==='pets'&&!l.pets)return false;else if(am!=='pets'&&!amGet(l,am))return false;}
    return true;
  });
  const srt={new:(a,b)=>b._posted-a._posted,pa:(a,b)=>a.price-b.price,pd:(a,b)=>b.price-a.price,sa:(a,b)=>a.sqm-b.sqm};
  shown.sort(srt[sort]||srt.new);
  render();pins();stats();
}

    showToast(`${newest.district} · ${fmtP(newest)}${fmtU(newest)} — ${String(newest.title).split('•')[0].trim()}`);
  }
  lastCount = shown.length;
}

}

function stats(){

function setView(v){
  ['split','map','list'].forEach(x=>document.getElementById('v'+x[0].toUpperCase()+x.slice(1)).classList.remove('on'));
  document.getElementById('v'+v[0].toUpperCase()+v.slice(1)).classList.add('on');
  const lp=document.getElementById('lp'),mp=document.getElementById('mp');
  if(v==='split'){lp.style.width='52%';lp.style.display='';mp.style.display='';}
  else if(v==='map'){lp.style.display='none';mp.style.display='';}
  else{lp.style.width='100%';lp.style.display='';mp.style.display='none';}
  setTimeout(()=>map.invalidateSize(),120);
}

// ══════════════════════════════════════
function openM(id){

  setHL(id);

  const ams=[
    ['📶','WiFi',am.wifi],['🍳','Плита',am.stove],['🌡','Кондиционер',am.conditioner],
    ['🏗','Балкон',am.balcony],['📺','Телевизор',am.tv],['🍽','Посудомойка',am.dishwasher],
    ['🛗','Лифт',am.elevator],['🫧','Стиралка',am.washing_machine],
    ['🅿️','Парковка',am.parking],['♨️','Микроволновка',am.microwave],
  ];
  const isNew=l._isNew||l.is_new==='True';
  const isExcl=l.is_exclusive==='True'||l.is_exclusive===true;

  let galleryPhotos = [];
  if (l.photos) {
    try { galleryPhotos = JSON.parse(l.photos); } catch(e){}
  }
  if (galleryPhotos.length === 0 && l.photo && String(l.photo).startsWith('http')) {
    galleryPhotos = [l.photo];
  }

  const buildGallery = (photos, emoji) => {
    if (photos.length === 0) return `<div class="gallery"><div class="gallery-slide ep">${emoji||'🏠'}</div></div>`;
    const slides = photos.map((u,si) =>
      `<img class="gallery-slide" src="${u}" referrerpolicy="no-referrer" loading="lazy"
        style="flex-shrink:0;width:100%;height:100%;object-fit:cover"
        onerror="this.style.background='#e4edf8'">`
    ).join('');
    const dots = photos.length > 1 ? photos.map((_,i) =>
      `<button class="gallery-dot${i===0?' on':''}" onclick="gotoSlide(${i})"></button>`
    ).join('') : '';
    const nav = photos.length > 1 ? `
      <button class="gallery-prev" onclick="prevSlide()">‹</button>
      <button class="gallery-next" onclick="nextSlide()">›</button>
      <div class="gallery-dots">${dots}</div>
      <div class="gallery-count">1 / ${photos.length}</div>` : '';
    return `<div class="gallery" id="gallery">
      <div class="gallery-track" id="gtrack">${slides}</div>
      ${nav}
    </div>`;
  };

  document.getElementById('mi').innerHTML=`
  <div class="modal-x-wrap" style="position:relative">${buildGallery(galleryPhotos, l._emoji)}</div>
  <div class="modal-body">
    <div class="modal-top">
      <div>
        <div class="modal-title">${l.title||''}</div>
        <div class="modal-addr">📍 ${l.address||''}, ${l.district||''}${l.metro?' · 🚇 '+l.metro:''}</div>
      </div>
      <div>
        <div class="modal-price-main">${fmtP(l)}</div>
        <div class="modal-price-sub">${fmtU(l)}${l.deposit?' · депозит $'+l.deposit:''}</div>
      </div>
    </div>
    <div class="modal-tags">
      ${l.type==='rent'?'<span class="mt mt-rent">🔑 Аренда</span>':''}
      ${l.type==='sale'?'<span class="mt mt-sale">🏷 Продажа</span>':''}
      ${l.type==='commercial'?'<span class="mt mt-comm">🏢 Коммерция</span>':''}
      ${isExcl?'<span class="mt mt-excl">⭐ Эксклюзив</span>':''}
      ${l.commission==0||l.commission==='0'?'<span class="mt mt-ok">✅ 0% комиссия</span>':''}
      ${isNew?'<span class="mt mt-excl">🆕 Новое</span>':''}
    </div>
    <div class="sec-title">Параметры</div>
    <div class="detail-grid">
      ${l.sqm?`<div class="di"><div class="di-lbl">Площадь</div><div class="di-val">${l.sqm} м²</div></div>`:''}
      ${l.floor&&l.floors?`<div class="di"><div class="di-lbl">Этаж</div><div class="di-val">${l.floor} из ${l.floors}</div></div>`:''}
      ${l.rooms!=null?`<div class="di"><div class="di-lbl">Комнаты</div><div class="di-val">${l.rooms||'Студия'}</div></div>`:''}
      ${l.heating?`<div class="di"><div class="di-lbl">Отопление</div><div class="di-val">${l.heating}</div></div>`:''}
      ${l.building?`<div class="di"><div class="di-lbl">Тип здания</div><div class="di-val">${blbl[l.building]||l.building}</div></div>`:''}
      <div class="di"><div class="di-lbl">Добавлено</div><div class="di-val">${ago(l._posted)} назад</div></div>
      ${l.tenants?`<div class="di"><div class="di-lbl">Жильцы</div><div class="di-val">${l.tenants}</div></div>`:''}
      ${l.term?`<div class="di"><div class="di-lbl">Срок</div><div class="di-val">${l.term}</div></div>`:''}
    </div>
    <div class="sec-title">Удобства</div>
    <div class="am-grid">${ams.map(([e,n,h])=>`<div class="am${h?'':' no'}">${e} ${n}</div>`).join('')}</div>
    <div class="modal-agent">
      <div class="modal-av">${ini(l.agent)}</div>
      <div>
        <div class="modal-an">${l.agent||'Агент'}</div>
        <div class="modal-ar">Rent in Tbilisi · Platform 90/10</div>
        <div class="modal-ar">${l.phone||'+995 599 20 67 16'}</div>
      </div>
    </div>
    <div class="modal-cta">
      <a class="mc mc-tg" href="https://t.me/David_Tibelashvili" target="_blank">✈️ Telegram</a>
      <a class="mc mc-red" href="tel:${String(l.phone||'+99559920 6716').replace(/\s/g,'')}">📞 Позвонить</a>
      <a class="mc mc-navy" href="${l.tg_url||'https://t.me/rent_tbilisi_ge'}" target="_blank">📢 Пост в канале</a>
    </div>
  </div>`;
  document.getElementById('mw').classList.add('open');
  setTimeout(initGallery, 50);
  if(mkrs[id]){map.flyTo([l._lat,l._lng],15,{duration:1});mkrs[id].openPopup();}
}

async function refresh(){

  await loadSheets();
  run();

    showToast(`+${ALL.length-prevCount} новых объявлений!`);
  }
}

  document.getElementById('ttext').textContent=txt;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),5000);
}

// ── GALLERY CONTROLS ──
let _gIdx = 0;
let _gTotal = 0;

function initGallery() {
  _gIdx = 0;
  const track = document.getElementById('gtrack');
  if (!track) return;
  _gTotal = track.children.length;
  updateGallery();
}

function gotoSlide(i) {
  _gIdx = Math.max(0, Math.min(i, _gTotal - 1));
  updateGallery();
}

function nextSlide() { gotoSlide(_gIdx + 1); }
function prevSlide() { gotoSlide(_gIdx - 1); }

function updateGallery() {
  const track = document.getElementById('gtrack');
  if (!track) return;
  track.style.transform = `translateX(-${_gIdx * 100}%)`;
  document.querySelectorAll('.gallery-dot').forEach((d,i) => d.classList.toggle('on', i===_gIdx));
  const cnt = document.querySelector('.gallery-count');
  if (cnt) cnt.textContent = (_gIdx+1) + ' / ' + _gTotal;
}


// ── MOBILE MAP ──
var mobileMap = null;
var mobileMarkers = {};

function openMobileMap() {
  document.getElementById('mobileMapOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(function() {
    if (!mobileMap) {
      mobileMap = L.map('map-mobile', {center:[41.714,44.800], zoom:13});
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        {attribution:'© OpenStreetMap © CARTO', maxZoom:19}).addTo(mobileMap);
    }
    mobileMap.invalidateSize();
    // Add markers
    Object.values(mobileMarkers).forEach(function(m){ mobileMap.removeLayer(m); });
    mobileMarkers = {};
    shown.forEach(function(l) {
      if (!l._lat || !l._lng) return;
      var isNew = l._isNew || l.is_new === 'True';
      var html2 = '<div class="pm' + (isNew?' new-pin':'') + '">' + fmtP(l) + '</div>';
      var icon = L.divIcon({html:html2, className:'', iconAnchor:[28,14]});
      var m = L.marker([l._lat, l._lng], {icon:icon}).addTo(mobileMap);
      m.bindPopup(
        '<div class="pu-photo">' + (l.photo && l.photo.startsWith('http') ? '<img src="' + l.photo + '" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover">' : '<div class="ep">' + (l._emoji||'🏠') + '</div>') + '</div>' +
        '<div class="pu-body">' +
        '<div class="pu-loc">' + (l.district||'') + '</div>' +
        '<div class="pu-price">' + fmtP(l) + fmtU(l) + '</div>' +
        '<div class="pu-btns">' +
        '<button class="pu-btn pb-navy" onclick="closeMobileMap();openM(\'' + l.id + '\')">Подробнее</button>' +
        '<a class="pu-btn pb-tg" href="https://t.me/David_Tibelashvili" target="_blank">✈️ TG</a>' +
        '</div></div>', {maxWidth:240});
      mobileMarkers[l.id] = m;
    });
    document.getElementById('mobileMapCount').textContent = shown.length + ' объявлений';
  }, 100);
}

function closeMobileMap() {
  document.getElementById('mobileMapOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
