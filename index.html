<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rent in Tbilisi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1E3A6E;--navy-d:#152d55;
  --red:#E8192C;
  --green:#25D366;
  --tg:#0088cc;
  --white:#fff;
  --g50:#f7f7f7;--g100:#ebebeb;--g200:#dddddd;
  --g400:#717171;--g700:#222222;--g900:#111111;
  --sh:0 1px 2px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --sh2:0 6px 20px rgba(0,0,0,.12);
  --bnav:64px;
}
html,body{height:100%;overflow:hidden}
body{font-family:"Inter",sans-serif;background:var(--white);color:var(--g700);display:flex;flex-direction:column}

/* ═══════════════════════════
   TOP NAV
═══════════════════════════ */
.topnav{
  background:var(--white);
  border-bottom:1px solid var(--g200);
  padding:12px 16px 10px;
  flex-shrink:0;
  z-index:100;
}

/* SEARCH PILL — main hero element */
.search-pill{
  display:flex;align-items:center;gap:12px;
  background:var(--white);
  border:1px solid var(--g200);
  border-radius:40px;
  padding:10px 16px;
  box-shadow:var(--sh);
  cursor:pointer;
  margin-bottom:14px;
  transition:box-shadow .2s;
}
.search-pill:active{box-shadow:var(--sh2)}
.search-icon{font-size:18px;flex-shrink:0}
.search-pill-texts{flex:1}
.search-pill-main{font-size:14px;font-weight:700;color:var(--g900)}
.search-pill-sub{font-size:12px;color:var(--g400)}
.search-pill-filter{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--g200);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}

/* SEARCH EXPANDED */
.search-expanded{
  display:none;
  flex-direction:column;
  gap:8px;
  margin-bottom:10px;
}
.search-expanded.open{display:flex}
.s-input-wrap{
  display:flex;align-items:center;gap:8px;
  border:1.5px solid var(--g200);
  border-radius:12px;padding:10px 14px;
  background:var(--white);
}
.s-input-wrap:focus-within{border-color:var(--navy)}
.s-input-wrap input{
  flex:1;border:none;outline:none;
  font-size:14px;font-family:"Inter",sans-serif;color:var(--g900);
  background:transparent;
}
.s-input-wrap input::placeholder{color:var(--g400)}
.s-row{display:flex;gap:8px}
.s-sel{
  flex:1;padding:9px 12px;border:1.5px solid var(--g200);
  border-radius:10px;font-size:13px;font-weight:500;
  color:var(--g700);background:var(--white);
  font-family:"Inter",sans-serif;appearance:none;cursor:pointer;
  outline:none;
}
.s-sel:focus{border-color:var(--navy)}
.s-apply{
  background:var(--navy);color:var(--white);
  border:none;border-radius:10px;
  padding:9px 18px;font-size:13px;font-weight:700;
  font-family:"Inter",sans-serif;cursor:pointer;
  flex-shrink:0;
}

/* CATEGORY SCROLL */
.cat-scroll{
  display:flex;gap:8px;overflow-x:auto;padding:2px 0;
}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:8px;
  font-size:11px;font-weight:600;color:var(--g400);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  border-bottom:2px solid transparent;transition:all .15s;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:"Inter",sans-serif;
}
.cat-btn .cat-icon{font-size:20px}
.cat-btn.on{color:var(--g900);border-bottom-color:var(--g900)}

/* LANG */
.topnav-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none}
.brand img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.brand-name{font-size:14px;font-weight:800;color:var(--navy)}
.lang-sw{display:flex;gap:2px;background:var(--g100);border-radius:8px;padding:2px}
.lb{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;
  border:none;background:transparent;color:var(--g400);cursor:pointer;font-family:"Inter",sans-serif}
.lb.on{background:var(--white);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ═══════════════════════════
   CONTENT AREA
═══════════════════════════ */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:var(--bnav)}
.content::-webkit-scrollbar{display:none}

/* SECTION */
.section{padding:0 16px;margin-bottom:24px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-size:18px;font-weight:800;color:var(--g900)}
.section-all{font-size:13px;font-weight:600;color:var(--g900);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:"Inter",sans-serif}

/* HORIZONTAL SCROLL ROW */
.h-scroll{display:flex;gap:14px;overflow-x:auto;margin:0 -16px;padding:0 16px}
.h-scroll::-webkit-scrollbar{display:none}

/* LISTING CARD horizontal */
.hcard{width:240px;flex-shrink:0;cursor:pointer}
.hcard-photo{
  width:240px;height:180px;border-radius:14px;
  overflow:hidden;background:var(--g100);
  position:relative;margin-bottom:10px;
}
.hcard-photo img{width:100%;height:100%;object-fit:cover;display:block}
.hcard-photo .ep{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#e4edf8,#c8d8ec)}
.hcard-fav{
  position:absolute;top:10px;right:10px;
  width:30px;height:30px;background:rgba(255,255,255,.85);
  border-radius:50%;border:none;cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.hcard-badge{
  position:absolute;top:10px;left:10px;
  background:var(--white);border-radius:6px;
  padding:3px 8px;font-size:10px;font-weight:800;color:var(--g900);
}
.hcard-body{}
.hcard-loc{font-size:13px;font-weight:600;color:var(--g900);margin-bottom:2px}
.hcard-sub{font-size:12px;color:var(--g400);margin-bottom:4px}
.hcard-price{font-size:14px;font-weight:700;color:var(--g900)}
.hcard-price span{font-weight:400;color:var(--g400)}

/* VERTICAL LIST */
.vlist{display:flex;flex-direction:column;gap:0}

/* LISTING CARD vertical */
.vcard{
  display:flex;gap:12px;padding:14px 0;
  border-bottom:1px solid var(--g100);cursor:pointer;
}
.vcard:last-child{border-bottom:none}
.vcard-photo{
  width:100px;height:80px;border-radius:10px;
  overflow:hidden;background:var(--g100);flex-shrink:0;
  position:relative;
}
.vcard-photo img{width:100%;height:100%;object-fit:cover}
.vcard-photo .ep{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,#e4edf8,#c8d8ec)}
.vcard-body{flex:1;min-width:0}
.vcard-loc{font-size:13px;font-weight:700;color:var(--g900);margin-bottom:2px}
.vcard-sub{font-size:11px;color:var(--g400);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-specs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.vspec{font-size:10px;color:var(--g400);background:var(--g50);padding:2px 6px;border-radius:5px}
.vcard-price{font-size:14px;font-weight:700;color:var(--g900)}
.vcard-price span{font-size:11px;font-weight:400;color:var(--g400)}
.vcard-fav{
  width:28px;height:28px;background:none;border:none;
  font-size:16px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  padding:0;
}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--g400)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:700;color:var(--g700);margin-bottom:6px}
.empty p{font-size:13px}

/* ═══════════════════════════
   BOTTOM NAV
═══════════════════════════ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bnav);
  background:var(--white);
  border-top:1px solid var(--g200);
  display:flex;align-items:stretch;
  z-index:9000;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -1px 0 rgba(0,0,0,.06);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  cursor:pointer;border:none;background:none;
  font-family:"Inter",sans-serif;
  color:var(--g300);transition:color .15s;
  padding:8px 4px;touch-action:manipulation;
}
.bnav-item.on{color:var(--red)}
.bnav-item svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.bnav-label{font-size:10px;font-weight:600;letter-spacing:0}

/* ═══════════════════════════
   MAP FULLSCREEN
═══════════════════════════ */
.map-screen{
  display:none;position:fixed;top:0;left:0;right:0;bottom:var(--bnav);
  z-index:500;flex-direction:column;
  background:var(--white);
}
.map-screen.open{display:flex}
.map-header{
  height:56px;background:var(--white);
  border-bottom:1px solid var(--g200);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  flex-shrink:0;
}
.map-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g900);padding:4px}
.map-title{font-size:16px;font-weight:700;color:var(--g900)}
.map-count{margin-left:auto;font-size:12px;color:var(--g400)}
#map{width:100%;flex:1}

/* Map markers */
.pm{background:var(--white);border:2px solid var(--navy);border-radius:18px;
  padding:4px 10px;font-family:"Inter",sans-serif;font-size:11px;font-weight:700;
  color:var(--navy);white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15);
  cursor:pointer;transition:all .15s;display:inline-block;line-height:1.4}
.pm:hover,.pm.on{background:var(--navy);color:var(--white)}
.leaflet-popup-content-wrapper{border-radius:14px!important;padding:0!important;
  overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.15)!important;border:1px solid var(--g200)!important}
.leaflet-popup-content{margin:0!important;width:230px!important}
.leaflet-popup-tip-container{display:none}
.pu-photo{height:100px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--g100)}
.pu-photo img{width:100%;height:100%;object-fit:cover}
.pu-photo .ep{font-size:36px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e4edf8,#c8d8ec)}
.pu-body{padding:10px 12px 12px}
.pu-loc{font-size:12px;font-weight:700;color:var(--g900);margin-bottom:3px}
.pu-price{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:8px}
.pu-btns{display:flex;gap:6px}
.pu-btn{flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:700;
  border:none;cursor:pointer;font-family:"Inter",sans-serif;text-decoration:none;
  text-align:center;display:block;color:var(--white)}
.pb-navy{background:var(--navy)}
.pb-tg{background:var(--tg)}

/* ═══════════════════════════
   MODAL (Detail)
═══════════════════════════ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{
  background:var(--white);border-radius:20px 20px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.34,1.1,.64,1);
}
.modal::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Prevent zoom on double tap */
button, a, .hcard, .vcard, .cat-btn, .bnav-item {
  touch-action: manipulation;
}
/* Gallery swipe */
.gallery { touch-action: pan-y; user-select: none; }
.gallery-track { will-change: transform; }

/* Gallery in modal */
.gallery{position:relative;width:100%;height:240px;overflow:hidden;background:var(--g100)}
.gallery-track{display:flex;height:100%;transition:transform .3s ease}
.gallery-slide{flex-shrink:0;width:100%;height:100%;object-fit:cover}
.gallery-slide.ep-slide{display:flex;align-items:center;justify-content:center;font-size:72px;background:linear-gradient(135deg,#e4edf8,#c0d4ec)}
.g-btn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;
  background:rgba(255,255,255,.9);border:none;border-radius:50%;cursor:pointer;
  font-size:16px;display:flex;align-items:center;justify-content:center;z-index:3}
.g-prev{left:10px}.g-next{right:10px}
.g-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:3}
.g-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);border:none;cursor:pointer;padding:0}
.g-dot.on{background:var(--white)}
.g-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.45);
  color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;z-index:3}

/* Modal drag handle */
.modal-handle{display:flex;justify-content:center;padding:10px 0 4px;position:absolute;top:0;left:0;right:0;z-index:5}
.modal-handle-bar{width:40px;height:4px;background:rgba(255,255,255,.6);border-radius:2px}
.modal-close{position:absolute;top:10px;right:12px;width:30px;height:30px;
  background:rgba(255,255,255,.9);border:none;border-radius:50%;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5}

.modal-body{padding:18px 16px 100px}
.modal-title{font-size:20px;font-weight:800;color:var(--g900);margin-bottom:4px}
.modal-addr{font-size:13px;color:var(--g400);margin-bottom:14px;display:flex;align-items:center;gap:4px}
.modal-price-row{display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--g100)}
.modal-price{font-size:22px;font-weight:800;color:var(--g900)}
.modal-price span{font-size:14px;font-weight:400;color:var(--g400)}
.modal-nocomm{font-size:12px;color:#16a34a;font-weight:600}

.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.mtag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.mt-rent{background:rgba(30,58,110,.08);color:var(--navy)}
.mt-sale{background:rgba(17,24,39,.08);color:var(--g700)}
.mt-excl{background:rgba(232,25,44,.08);color:var(--red)}
.mt-comm{background:rgba(109,40,217,.08);color:#6d28d9}

.modal-sec{margin-bottom:18px}
.modal-sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);margin-bottom:10px}
.params-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.param-item{background:var(--g50);border-radius:10px;padding:10px 12px}
.param-lbl{font-size:10px;color:var(--g400);margin-bottom:2px}
.param-val{font-size:13px;font-weight:700;color:var(--g900)}
.am-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.am-item{display:flex;align-items:center;gap:7px;padding:8px 10px;
  background:var(--g50);border-radius:9px;font-size:12px;font-weight:500;color:var(--g700)}
.am-item.no{opacity:.3;text-decoration:line-through}

.agent-row{display:flex;align-items:center;gap:12px;padding:14px;background:var(--g50);border-radius:12px;margin-bottom:16px}
.agent-av{width:40px;height:40px;background:var(--navy);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--white);flex-shrink:0}
.agent-name{font-size:14px;font-weight:700;color:var(--g900)}
.agent-role{font-size:11px;color:var(--g400);margin-top:2px}

.modal-cta{display:flex;gap:8px}
.mcta{flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:700;
  border:none;cursor:pointer;font-family:"Inter",sans-serif;
  text-decoration:none;text-align:center;display:flex;align-items:center;
  justify-content:center;gap:6px;color:var(--white)}
.mcta:active{opacity:.85}
.mc-navy{background:var(--navy)}
.mc-green{background:var(--green)}
.mc-tg{background:var(--tg)}

/* ═══════════════════════════
   FAVORITES SCREEN
═══════════════════════════ */
.fav-screen{display:none;position:fixed;top:0;left:0;right:0;bottom:var(--bnav);background:var(--white);
  z-index:400;flex-direction:column;}
.fav-screen.open{display:flex}
.fav-header{height:56px;border-bottom:1px solid var(--g200);
  display:flex;align-items:center;padding:0 16px;flex-shrink:0}
.fav-title{font-size:18px;font-weight:800;color:var(--g900)}
.fav-body{flex:1;overflow-y:auto;padding:16px}
.fav-body::-webkit-scrollbar{display:none}

/* SVG ICONS */
.ico{display:inline-block;vertical-align:middle}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--bnav) + 12px);left:50%;
  transform:translateX(-50%) translateY(40px);
  background:var(--g900);color:var(--white);
  padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;
  z-index:3000;transition:transform .3s cubic-bezier(.34,1.4,.64,1);
  white-space:nowrap;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* DESKTOP */
@media(min-width:768px){
  :root{--bnav:0px}
  body{overflow:hidden;flex-direction:row}
  .bnav{display:none}
  .topnav{width:380px;min-width:380px;height:100%;border-right:1px solid var(--g200);
    border-bottom:none;overflow-y:auto;display:flex;flex-direction:column}
  .topnav::-webkit-scrollbar{display:none}
  .content{flex:1;border-right:none}
  .map-screen{position:relative;display:flex!important;flex:1;padding-bottom:0;z-index:auto}
  .map-screen .map-header{display:none}
  #map{flex:1}
  .hcard{width:200px}
  .hcard-photo{width:200px;height:150px}
}


/* ── SEARCH PILL ── */
.search-pill{
  display:flex;align-items:center;gap:12px;
  background:var(--white);border:1px solid var(--g200);
  border-radius:40px;padding:10px 16px;
  box-shadow:var(--sh);cursor:pointer;
  margin-bottom:0;transition:box-shadow .2s;
  touch-action:manipulation;
}
.search-pill.active{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,110,.1)}
.search-icon{font-size:18px;flex-shrink:0}
.search-pill-texts{flex:1}
.search-pill-main{font-size:14px;font-weight:700;color:var(--g900)}
.search-pill-sub{font-size:12px;color:var(--g400)}
.search-pill-filter{width:32px;height:32px;border-radius:50%;border:1px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.search-pill-filter.active{background:var(--navy);border-color:var(--navy)}

/* ── FILTER PANEL ── */
.filter-panel{
  display:none;flex-direction:column;gap:8px;
  padding:14px;background:var(--white);
  border:1px solid var(--g200);border-radius:16px;
  margin-top:8px;box-shadow:var(--sh2);
}
.filter-panel.open{display:flex}
.f-row{display:flex;gap:8px}
.f-sel{
  flex:1;padding:9px 12px;border:1.5px solid var(--g200);
  border-radius:10px;font-size:13px;font-weight:500;
  color:var(--g700);background:var(--white);
  font-family:"Inter",sans-serif;appearance:none;
  cursor:pointer;outline:none;touch-action:manipulation;
}
.f-sel:focus{border-color:var(--navy)}


/* Advanced toggle button */
.adv-toggle{
  display:flex;align-items:center;gap:6px;
  background:none;border:1.5px solid var(--g200);
  border-radius:10px;padding:8px 14px;
  font-size:13px;font-weight:600;color:var(--g500);
  cursor:pointer;font-family:"Inter",sans-serif;
  width:100%;touch-action:manipulation;transition:all .15s;
}
.adv-toggle.open{border-color:var(--navy);color:var(--navy)}

/* Advanced filters panel */
.adv-filters{
  display:none;flex-direction:column;gap:14px;
  padding:14px;background:var(--g50);border-radius:12px;
  margin-bottom:8px;
}
.adv-filters.open{display:flex}
.adv-group{}
.adv-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--g400);margin-bottom:8px}
.adv-pills{display:flex;flex-wrap:wrap;gap:6px}
.ap{
  padding:6px 12px;border:1.5px solid var(--g200);border-radius:20px;
  font-size:12px;font-weight:600;color:var(--g500);background:var(--white);
  cursor:pointer;font-family:"Inter",sans-serif;transition:all .15s;
  touch-action:manipulation;
}
.ap:active{transform:scale(.97)}
.ap.on{background:var(--navy);border-color:var(--navy);color:var(--white)}
.adv-reset{
  margin-top:4px;background:none;border:none;
  font-size:13px;font-weight:600;color:var(--red);
  cursor:pointer;font-family:"Inter",sans-serif;text-align:left;
  padding:4px 0;touch-action:manipulation;
}

/* ── SKELETON LOADING ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear;border-radius:8px}
.skel-wrap{padding:0 16px;margin-bottom:24px}
.skel-title{height:22px;width:140px;margin-bottom:16px}
.skel-hscroll{display:flex;gap:14px;overflow:hidden;margin:0 -16px;padding:0 16px}
.skel-hcard{width:240px;flex-shrink:0}
.skel-hphoto{width:240px;height:180px;border-radius:14px;margin-bottom:10px}
.skel-line{height:14px;border-radius:6px;margin-bottom:7px}
.skel-line.w80{width:80%}
.skel-line.w60{width:60%}
.skel-line.w40{width:40%}
.skel-vlist{display:flex;flex-direction:column;gap:0}
.skel-vcard{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #f5f5f5}
.skel-vphoto{width:100px;height:80px;border-radius:10px;flex-shrink:0}
.skel-vbody{flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center}
</style>

function loadJSONP(url){
  return new Promise(function(resolve,reject){
    const id="gs_"+Date.now();
    window[id]=resolve;
    const s=document.createElement("script");
    s.src=url+(url.includes("?")?"&":"?")+"cb="+id;
    s.onerror=function(){ reject(new Error("load failed")); };
    setTimeout(function(){ reject(new Error("timeout")); },12000);
    document.head.appendChild(s);
  });
}

async function loadSheets(){

    const bool=function(v){ return v==="TRUE"||v===true; };
    ALL=rows.map(function(obj,i){

        elevator:bool(obj.elevator),washing_machine:bool(obj.washing_machine),
        microwave:bool(obj.microwave),parking:bool(obj.parking),
      };
      obj.is_exclusive=bool(obj.is_exclusive);
      obj.is_new=bool(obj.is_new);
      if(obj.photos&&String(obj.photos).startsWith("[")){
        try{ obj._photos=JSON.parse(obj.photos); }catch(e){ obj._photos=[]; }
      } else { obj._photos=[]; }
      const mp=String(obj.photo||"").replace("video:","");
      if(mp.startsWith("http")&&!obj._photos.some(function(p){ return String(p).replace("video:","")===mp; })){
        obj._photos.unshift(obj.photo);
      }
      if(obj.lat&&obj.lng&&parseFloat(obj.lat)>0){
        obj._lat=parseFloat(obj.lat); obj._lng=parseFloat(obj.lng);
      } else {
        const c=rndCoord(obj.district||"");
        obj._lat=c[0]; obj._lng=c[1];
      }
      obj._posted=obj.parsed_at?new Date(obj.parsed_at):new Date(Date.now()-i*3600000);

function parseHashtags(query) {
  var result = {
    districts:[], metros:[], priceMin:null, priceMax:null,
    rooms:null, building:null, amenities:[], type:null,
    freeText:"", pets:null
  };
  var raw = query.trim();
  // Extract hashtags
  var tags = (raw.match(/#[A-Za-z0-9]+/g)||[]).map(function(t){ return t.slice(1).toLowerCase(); });
  // Remaining free text (non-hashtag words)
  result.freeText = raw.replace(/#[A-Za-z0-9]+/g,"").trim().toLowerCase();

  tags.forEach(function(tag){
    // District
    if(DISTRICT_TAGS.indexOf(tag)!==-1){ result.districts.push(tag); return; }
    // Metro
    if(METRO_TAGS.indexOf(tag)!==-1){ result.metros.push(tag); return; }
    // Price range
    if(PRICE_RANGES[tag]){
      result.priceMin=PRICE_RANGES[tag][0];
      result.priceMax=PRICE_RANGES[tag][1];
      return;
    }
    // Beds
    if(BED_TAGS[tag]!==undefined){ result.rooms=BED_TAGS[tag]; return; }
    // Building
    if(BUILD_TAGS[tag]){ result.building=BUILD_TAGS[tag]; return; }
    // Amenities
    if(AM_TAG_MAP[tag]){ result.amenities.push(AM_TAG_MAP[tag]); return; }
    // Type
    if(tag==="apartment"||tag==="house") result.type="rent";
    if(tag==="commercial") result.type="commercial";
    // Pets
    if(tag==="allowed") result.pets=true;
    if(tag==="notallowed") result.pets=false;
    if(tag==="byagreement") result.pets="byagreement";
    // Heating
    if(tag==="gasheating") result.amenities.push("gas");
    if(tag==="centralheating") result.amenities.push("central");
    if(tag==="electricalheating"||tag==="acheating") result.amenities.push("electric");
  });
  return result;
}

function run(){
  var price = document.getElementById("sPrice").value;
  var dist  = document.getElementById("sDist").value;
  var metro = document.getElementById("sMetro").value;
  var rooms = document.getElementById("sRooms").value;

  shown=ALL.filter(function(l){
    var r=parseInt(l.rooms)||0;
    var lDist  = (l.district||"").toLowerCase();
    var lMetro = (l.metro||"").toLowerCase().replace(/ /g,"");
    var lAddr  = (l.address||"").toLowerCase();

    // District
    if(dist && l.district!==dist) return false;
    // Metro
    if(metro){
      var mLow=metro.toLowerCase();
      if(!lMetro.includes(mLow) && !lAddr.replace(/ /g,"").includes(mLow)) return false;
    }
    // Price
    if(price){
      var pts=price.split("-"); var mn=parseFloat(pts[0]),mx=parseFloat(pts[1]);
      var pp=parseFloat(l.price)||0;
      if(pp<mn||pp>mx) return false;
    }
    // Rooms
    if(rooms!==""){
      if(rooms==="4"&&r<4) return false;
      if(rooms!=="4"&&r!==parseInt(rooms)) return false;
    }
    // Advanced: building
    if(advBuild&&l.building!==advBuild) return false;
    // Advanced: pets
    if(advPets==="yes"&&!l.pets) return false;
    if(advPets==="no"&&l.pets) return false;
    // Advanced: term
    if(advTerm&&!(l.term||"").includes(advTerm)) return false;
    // Advanced: amenities
    for(var ai=0;ai<advAms.length;ai++){
      if(!l._am||!l._am[advAms[ai]]) return false;
    }
    // Category
    if(catFilter==="new"&&l.building!=="New") return false;
    if(catFilter==="excl"&&!l.is_exclusive) return false;
    if(catFilter==="comm"&&l.type!=="commercial") return false;
    if(catFilter&&!isNaN(catFilter)){
      var cv=parseInt(catFilter);
      if(cv===1&&r>1) return false;
      if(cv>1&&r!==cv) return false;
    }
    return true;
  })
  shown.sort(function(a,b){ return b._posted-a._posted; });
  render();
  updateMapPins();
}

// ════════════════════════════════
//  RENDER
// ════════════════════════════════
function render(){
  const newItems=shown.filter(function(l){ return l._isNew; }).slice(0,10);
  const allItems=shown;

  // Horizontal new
  var ns=document.getElementById("newScroll");
  ns.innerHTML="";
  if(newItems.length){
    newItems.forEach(function(l){ ns.appendChild(hcard(l)); });
  } else {
    ns.innerHTML='<div style="color:var(--g400);font-size:13px;padding:20px 0">'+t("no_results")+"</div>";
  }

  // Vertical all
  var vl=document.getElementById("vlist");
  document.getElementById("listCount").textContent=allItems.length+" "+t("listings");
  vl.innerHTML="";
  if(allItems.length){
    allItems.forEach(function(l){ vl.appendChild(vcard(l)); });
  } else {
    vl.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><h3>'+t("no_results")+"</h3><p>"+t("no_results_sub")+"</p></div>";
  }

  // Fav nav icon
  // Update fav icon fill when saved
  var favBtn = document.getElementById("bn-fav");
  if(favBtn){
    var favSvg = favBtn.querySelector("svg path");
    if(favSvg) favSvg.style.fill = favs.size>0 ? "currentColor" : "none";
  }
}

function hcard(l){
  var fv=favs.has(l.id);
  var el=document.createElement("div");
  el.className="hcard";
  el.dataset.id=l.id;
  el.onclick=function(){ openModal(l.id); };
  el.innerHTML='<div class="hcard-photo">'+pImg(l)
    +(l._isNew?'<div class="hcard-badge">'+t("badge_new")+"</div>":"")
    +(l.is_exclusive?'<div class="hcard-badge" style="top:auto;bottom:10px;left:10px">'+t("badge_excl")+"</div>":"")
    +'<button class="hcard-fav">'+(fv?"❤️":"🤍")+"</button>"
    +'</div><div class="hcard-body">'
    +'<div class="hcard-loc">'+(l.district||"")+(l.metro?" · "+l.metro:"")+"</div>"
    +'<div class="hcard-sub">'+(l.title||"")+"</div>"
    +'<div class="hcard-price">'+fmtP(l)+' <span>'+fmtU(l)+"</span></div>"
    +"</div>";
  el.querySelector(".hcard-fav").onclick=function(e){ e.stopPropagation(); fav(e,l.id); };
  return el;
}

function vcard(l){
  var fv=favs.has(l.id);
  var el=document.createElement("div");
  el.className="vcard";
  el.onclick=function(){ openModal(l.id); };
  el.innerHTML='<div class="vcard-photo">'+pImg(l)+"</div>"
    +'<div class="vcard-body">'
    +'<div class="vcard-loc">'+(l.district||"")+"</div>"
    +'<div class="vcard-sub">'+(l.title||"")+"</div>"
    +'<div class="vcard-specs">'
    +(l.sqm?'<span class="vspec">'+l.sqm+' m²</span>':"")
    +(l.floor&&l.floors?'<span class="vspec">'+l.floor+"/"+l.floors+"</span>":"")
    +(l.rooms!=null?'<span class="vspec">'+(l.rooms||"S")+"br</span>":"")
    +(l._am&&l._am.wifi?'<span class="vspec">WiFi</span>':"")
    +"</div>"
    +'<div class="vcard-price">'+fmtP(l)+' <span>'+fmtU(l)+"</span></div>"
    +"</div>"
    +'<button class="vcard-fav">'+(fv?"❤️":"🤍")+"</button>";
  el.querySelector(".vcard-fav").onclick=function(e){ e.stopPropagation(); fav(e,l.id); };
  return el;
}


function fav(e,id){
  e.stopPropagation();
  if(favs.has(id)) favs.delete(id); else favs.add(id);
  render();
  renderFavs();
}

function openModal(id){

    ["🏗",t("am_balc"),am.balcony],["📺",t("am_tv"),am.tv],["🍽",t("am_dish"),am.dishwasher],
    ["🛗",t("am_lift"),am.elevator],["🫧",t("am_wash"),am.washing_machine],
    ["🅿️",t("am_park"),am.parking],["♨️",t("am_micro"),am.microwave],
  ];
  let photos=l._photos&&l._photos.length?l._photos:(l.photo&&l.photo.startsWith("http")?[l.photo]:[]);

  const buildGallery=function(photos){
    if(!photos.length) return '<div class="gallery"><div class="gallery-slide ep-slide">'+(l._emoji||"🏠")+"</div></div>";
    const slides=photos.map(function(u){
      const isVid=String(u).startsWith("video:");
      const src=isVid?u.replace("video:",""):u;
      if(isVid){
        return '<a href="'+(l.tg_url||"https://t.me/rent_tbilisi_ge")+'" target="_blank" style="display:block;flex-shrink:0;width:100%;height:100%;position:relative;background:#111;text-decoration:none">'
          +'<img src="'+src+'" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover;opacity:.85">'
          +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">'
          +'<div style="width:56px;height:56px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 12px rgba(0,0,0,.3)">▶️</div>'
          +'<div style="background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:12px">Watch in Telegram</div>'
          +"</div></a>";
      }
      return '<img class="gallery-slide" src="'+src+'" referrerpolicy="no-referrer" loading="lazy" style="flex-shrink:0;width:100%;height:100%;object-fit:cover">';
    }).join("");
    const nav=photos.length>1
      ?'<button class="g-btn g-prev" onclick="gPrev()">‹</button>'
       +'<button class="g-btn g-next" onclick="gNext()">›</button>'
       +'<div class="g-dots">'+photos.map(function(_,i){ return '<button class="g-dot'+(i===0?" on":"")+'" onclick="gGoto('+i+')"></button>'; }).join("")+"</div>"
       +'<div class="g-count">1 / '+photos.length+"</div>"
      :"";
    return '<div class="gallery" id="gal"><div class="gallery-track" id="gtrack">'+slides+"</div>"+nav+"</div>";
  };

  const blbl={New:t("new_build"),Old:t("old_build"),Soviet:t("soviet_build")};

  var mc = document.getElementById("modalContent");
  mc.innerHTML = buildGallery(photos);
  var closeBtn = document.createElement("button");
  closeBtn.className = "modal-close"; closeBtn.textContent = "✕";
  closeBtn.onclick = closeModal; mc.appendChild(closeBtn);
  var amsHTML = ams.map(function(a){ return '<div class="am-item'+(a[2]?"":" no")+'">'+a[0]+" "+a[1]+"</div>"; }).join("");
  var tagsHTML = (l.type==="rent"?'<span class="mtag mt-rent">🔑 '+t("deal_rent")+"</span>":"")
    +(l.type==="sale"?'<span class="mtag mt-sale">🏷 '+t("deal_sale")+"</span>":"")
    +(l.type==="commercial"?'<span class="mtag mt-comm">🏢 '+t("deal_comm")+"</span>":"")
    +(l.is_exclusive?'<span class="mtag mt-excl">'+t("tag_excl")+"</span>":"");
  var paramsHTML = (l.sqm?'<div class="param-item"><div class="param-lbl">'+t("lbl_area")+'</div><div class="param-val">'+l.sqm+' m²</div></div>':"")
    +(l.floor&&l.floors?'<div class="param-item"><div class="param-lbl">'+t("lbl_floor")+'</div><div class="param-val">'+l.floor+" "+t("of")+" "+l.floors+'</div></div>':"")
    +(l.rooms!=null?'<div class="param-item"><div class="param-lbl">'+t("lbl_rooms")+'</div><div class="param-val">'+(l.rooms||"Studio")+'</div></div>':"")
    +(l.heating?'<div class="param-item"><div class="param-lbl">'+t("lbl_heat")+'</div><div class="param-val">'+l.heating+'</div></div>':"")
    +(l.building?'<div class="param-item"><div class="param-lbl">'+t("lbl_bld")+'</div><div class="param-val">'+(blbl[l.building]||l.building)+'</div></div>':"")
    +'<div class="param-item"><div class="param-lbl">'+t("lbl_added")+'</div><div class="param-val">'+ago(l._posted)+'</div></div>';
  var body = document.createElement("div");
  body.className = "modal-body";
  body.innerHTML = '<div class="modal-title">'+(l.title||"")+"</div>"
    +'<div class="modal-addr">📍 '+(l.address||"")+", "+(l.district||"")+(l.metro?" · 🚇 "+l.metro:"")+"</div>"
    +'<div class="modal-price-row"><div>'
    +'<div class="modal-price">'+fmtP(l)+' <span>'+fmtU(l)+"</span></div>"
    +(l.deposit?'<div class="modal-nocomm">'+t("deposit")+" $"+l.deposit+"</div>":"")
    +'<div class="modal-nocomm">'+t("nocomm")+"</div>"
    +"</div>"
    +'<div class="modal-tags">'+tagsHTML+"</div></div>"
    +'<div class="modal-sec"><div class="modal-sec-title">'+t("sec_params")+'</div><div class="params-grid">'+paramsHTML+"</div></div>"
    +'<div class="modal-sec"><div class="modal-sec-title">'+t("sec_ams")+'</div><div class="am-grid">'+amsHTML+"</div></div>"
    +'<div class="agent-row"><div class="agent-av">'+ini(l.agent)+"</div><div>"
    +'<div class="agent-name">'+(l.agent||"Agent")+"</div>"
    +'<div class="agent-role">'+t("agent_role")+"</div>"
    +'<div class="agent-role">+995 599 20 67 16</div></div></div>'
    +'<div class="modal-cta">'
    +'<a class="mcta mc-tg" href="https://t.me/David_Tibelashvili" target="_blank">'+TG_ICO+" "+t("btn_tg")+"</a>"
    +'<a class="mcta mc-green" href="tel:+995599206716">'+PH_ICO+" "+t("btn_call")+"</a>"
    +'<a class="mcta mc-navy" href="'+(l.tg_url||"https://t.me/rent_tbilisi_ge")+'" target="_blank">📢</a>'
    +"</div>";
  mc.appendChild(body);

  document.getElementById("modalBg").classList.add("open");
  setTimeout(initGallery,50);
}

// ════════════════════════════════
//  GALLERY
// ════════════════════════════════
// Touch swipe for gallery
var _gTouchX=0;
function gTouchStart(e){ _gTouchX=e.touches[0].clientX; }
function gTouchEnd(e){
  var dx=e.changedTouches[0].clientX-_gTouchX;
  if(Math.abs(dx)>40){ if(dx<0) gNext(); else gPrev(); }
}

var _gI=0,_gT=0;
function initGallery(){
  _gI=0; var gal=document.getElementById("gal");
  var tr=document.getElementById("gtrack");
  if(!tr) return; _gT=tr.children.length; updGallery();
  if(gal){
    gal.removeEventListener("touchstart",gTouchStart);
    gal.removeEventListener("touchend",gTouchEnd);
    gal.addEventListener("touchstart",gTouchStart,{passive:true});
    gal.addEventListener("touchend",gTouchEnd,{passive:true});
  }
}
function gGoto(i){ _gI=Math.max(0,Math.min(i,_gT-1)); updGallery(); }
function gNext(){ gGoto(_gI+1); }
function gPrev(){ gGoto(_gI-1); }
function updGallery(){
  const tr=document.getElementById("gtrack");
  if(!tr) return;
  tr.style.transform="translateX(-"+(_gI*100)+"%)";
  document.querySelectorAll(".g-dot").forEach(function(d,i){ d.classList.toggle("on",i===_gI); });
  const cnt=document.querySelector(".g-count");
  if(cnt) cnt.textContent=(_gI+1)+" / "+_gT;
}

// ════════════════════════════════
//  MAP
// ════════════════════════════════
var mapInited=false;
function initMap(){
  if(mapInited) return;
  map=L.map("map",{center:[41.714,44.800],zoom:13});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
    {attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);
  mapInited=true;
  updateMapPins();
}

function updateMapPins(){
  if(!mapInited) return;
  Object.values(mkrs).forEach(function(m){ map.removeLayer(m); }); mkrs={};
  shown.forEach(function(l){
    if(!l._lat||!l._lng) return;
    const icon=L.divIcon({html:'<div class="pm">'+fmtP(l)+"</div>",className:"",iconAnchor:[28,14]});
    const m=L.marker([l._lat,l._lng],{icon:icon}).addTo(map);
    const ph=(l._photos&&l._photos[0])||l.photo||"";
    const phH=ph&&ph.startsWith("http")
      ?'<img src="'+ph+'" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover">'
      :'<div class="ep">'+(l._emoji||"🏠")+"</div>";
    m.bindPopup(
      '<div class="pu-photo">'+phH+"</div>"
      +'<div class="pu-body">'
      +'<div class="pu-loc">'+(l.district||"")+" · "+(l.title||"").split("•")[0]+"</div>"
      +'<div class="pu-price">'+fmtP(l)+fmtU(l)+"</div>"
      +'<div class="pu-btns">'
      +'<button class="pu-btn pb-navy" data-mid="'+l.id+'" onclick="closeMap();openModal(this.dataset.mid)">'+t("btn_details")+"</button>"
      +'<a class="pu-btn pb-tg" href="https://t.me/David_Tibelashvili" target="_blank">'+TG_ICO+" TG</a>"
      +"</div></div>",{maxWidth:240});
    mkrs[l.id]=m;
  });
  document.getElementById("mapCount").textContent=shown.length+" "+t("listings");
}

// ════════════════════════════════
//  NAVIGATION
// ════════════════════════════════
function setNav(tab){
  // Update bottom nav
  ["rent","sale","map","fav"].forEach(function(n){
    document.getElementById("bn-"+n).classList.toggle("on",n===tab);
  });

  // Hide all screens
  document.getElementById("mapScreen").classList.remove("open");
  document.getElementById("favScreen").classList.remove("open");

  if(tab==="map"){
    document.getElementById("mapScreen").classList.add("open");
    initMap();
    setTimeout(function(){ if(map) map.invalidateSize(); },200);
    activeNav="map";
    return;
  }
  if(tab==="fav"){
    document.getElementById("favScreen").classList.add("open");
    renderFavs();
    activeNav="fav";
    return;
  }

  // Rent or Sale — switch channel
  activeNav=tab;
  if(tab!==ACTIVE_TAB){
    ACTIVE_TAB=tab;
    ALL=[];shown=[];
    // Show skeleton while loading
    var sk=document.getElementById("skeleton");
    var sn=document.getElementById("secNew");
    var sa=document.getElementById("secAll");
    if(sk) sk.style.display="";
    if(sn) sn.style.display="none";
    if(sa) sa.style.display="none";
    loadSheets().then(function(){ run(); });
  }
}

function closeMap(){
  document.getElementById("mapScreen").classList.remove("open");
  const prevNav=ACTIVE_TAB;
  ["rent","sale","map","fav"].forEach(function(n){
    document.getElementById("bn-"+n).classList.toggle("on",n===prevNav);
  });
}

// Search panel state
var searchPanelOpen = false;
function toggleSearch(){
  searchPanelOpen = !searchPanelOpen;
  document.getElementById("filterPanel").classList.toggle("open", searchPanelOpen);
  document.getElementById("search-pill") && document.querySelector(".search-pill").classList.toggle("active", searchPanelOpen);
  document.querySelector(".search-pill").classList.toggle("active", searchPanelOpen);
  document.getElementById("filterDot").classList.toggle("active", searchPanelOpen);
}

function updatePillSub(){
  var dist  = document.getElementById("sDist").value;
  var metro = document.getElementById("sMetro").value;
  var price = document.getElementById("sPrice").value;
  var rooms = document.getElementById("sRooms").value;
  var parts = [];
  if(dist)  parts.push(dist);
  if(metro) parts.push(metro);
  if(price) parts.push("$"+price.replace("-","–").replace("99999","+"));
  if(rooms) parts.push(rooms==="0"?"Studio":rooms+"br");
  document.getElementById("pillSub").textContent = parts.length ? parts.join(" · ") : "Any district · Any price";
  document.getElementById("pillMain").textContent = parts.length ? "Showing filtered results" : "Where are you looking?";
}

// Advanced filter state
var advBuild="", advPets="", advTerm="", advAms=[];
var advOpen=false;

function toggleAdv(){
  advOpen=!advOpen;
  document.getElementById("advFilters").classList.toggle("open",advOpen);
  document.getElementById("advToggle").classList.toggle("open",advOpen);
  document.getElementById("advArrow").textContent=advOpen?"▴":"▾";
  document.getElementById("advLabel").textContent=advOpen?"Hide filters":"More filters";
}

function setAdv(el,group,val){
  document.querySelectorAll("#"+group+" .ap").forEach(function(b){b.classList.remove("on");});
  el.classList.add("on");
  if(group==="fBuild") advBuild=val;
  if(group==="fPets")  advPets=val;
  if(group==="fTerm")  advTerm=val;
  run();
}

function toggleAm(el,am){
  el.classList.toggle("on");
  if(el.classList.contains("on")){
    if(advAms.indexOf(am)===-1) advAms.push(am);
  } else {
    advAms=advAms.filter(function(a){return a!==am;});
  }
  run();
}

function resetAdv(){
  advBuild=""; advPets=""; advTerm=""; advAms=[];
  document.querySelectorAll(".adv-filters .ap").forEach(function(b){b.classList.remove("on");});
  document.querySelectorAll(".adv-filters .ap[data-val='']").forEach(function(b){b.classList.add("on");});
  document.getElementById("sDist").value="";
  document.getElementById("sMetro").value="";
  document.getElementById("sPrice").value="";
  document.getElementById("sRooms").value="";
  run();
}

function showToast(txt){

// ════════════════════════════════
//  REFRESH
// ════════════════════════════════
async function refresh(){
  const prev=ALL.length;
  await loadSheets();
  run();
  if(ALL.length>prev) showToast("+"+(ALL.length-prev)+" "+t("listings"));
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
window.addEventListener("load",async function(){
  document.querySelectorAll(".lb").forEach(function(b){ b.classList.toggle("on",b.textContent===LANG.toUpperCase()); });
  applyI18n();
  // Desktop: init map immediately
  if(window.innerWidth>=768){ initMap(); }
  await loadSheets();
  run();
  setInterval(refresh,REFRESH_MS);
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeModal(); });
});
